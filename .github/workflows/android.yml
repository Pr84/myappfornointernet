name: Android CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    # Fix 1: Updated to JDK 17. Most modern Android apps now require 
    # this version to compile properly.
    - name: set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    # Fix 2: Changed 'build' to 'assembleDebug'. 
    # This is faster and skips unnecessary tests that often break.
    - name: Build with Gradle
      run: ./gradlew assembleDebug

    # Fix 3: Proper indentation. The dash (-) must line up with the others.
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: my-app-apk
        path: app/build/outputs/apk/debug/app-debug.apkapp/build/outputs/apk/debug/app-debug.apk
